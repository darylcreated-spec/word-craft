<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 240px;
      padding: 12px;
      margin: 0;
      background-color: #0d0f14;
      color: #e2e8f0;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      text-align: center;
      letter-spacing: 0.5px;
      background: linear-gradient(135deg, #00f0ff, #9b51e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      background-color: rgba(255, 255, 255, 0.03);
      color: #e2e8f0;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }
    .btn:hover {
      background-color: #9b51e0;
      border-color: #9b51e0;
      box-shadow: 0 0 8px rgba(155, 81, 224, 0.4);
    }
    .btn-primary {
      background: linear-gradient(135deg, #9b51e0, #00f0ff);
      border: none;
      color: #fff;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(155, 81, 224, 0.4);
    }
    .info {
      font-size: 11px;
      color: #8a99ad;
      text-align: center;
      line-height: 1.4;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="title">Word Craft Assistant</div>
  <button class="btn btn-primary" id="btn-grab">Craft Selected Text</button>
  <button class="btn" id="btn-open">Open Dashboard</button>
  <div class="info">Select text on any webpage or Google Doc, click "Craft Selected Text" to begin humanizing.</div>

  <script src="popup.js"></script>
</body>
</html>
